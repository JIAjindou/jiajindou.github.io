title: Jindou Jia
name: Jindou Jia
position: Postdoc
email: jindou.jia@ntu.edu.sg
description: >-
  I am a postdoc in the [MARS](http://marslab.tech) Lab at Nanyang Technological University (NTU), working with Prof. [Jianfei Yang](https://marsyang.site/). I completed my Ph.D. in 2025 from the School of Automation Science and Electrical Engineering and Shenyuan Honors College, Beihang University, China. I was supervised by Prof. [Lei Guo](https://scholar.google.com/citations?user=IxO-SDwAAAAJ&hl=zh-CN), Prof. [Xiang Yu](https://scholar.google.com/citations?user=6UgtuZ8AAAAJ&hl=zh-CN&oi=ao), and Prof. [Kexin Guo](https://scholar.google.com/citations?hl=zh-CN&user=c0MaejIAAAAJ).
  
  My research aims at generalizable robot learning. By integrating **world models**, **generative policies**, and **uncertainty prediction** with physical priors, I work toward robots that reliably transfer from training to unseen environments.

